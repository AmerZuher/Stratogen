# A generic Alembic configuration file.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html#create-an-alembic-ini-file

[alembic]
# path to migration scripts
# Since alembic.ini is in 'Backend', the path to the scripts is relative from here.
script_location = app/alembic

# Path to find templates for new migration scripts, relative to the
# current working directory.
# template_path = %(here)s/templates

# The file encoding to use for migration scripts.
# file_template = %%(rev)s_%%(slug)s

# timezone for migration file timestamps
# timezone =

# sys.path path, will be prepended to sys.path if present.
# E.g. .
# prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
