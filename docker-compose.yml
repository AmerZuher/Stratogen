services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file: ./Backend/Secret/.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis_cache

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5

  backend:
      build: ./Backend
      container_name: fastapi_backend
      env_file: ./Backend/Secret/.env
      ports:
        - "8000:8000"
      depends_on:
        db:
          condition: service_healthy
        ollama:
          condition: service_healthy
      environment:
        - DB_HOST=db
        - DATABASE_URL=postgresql+asyncpg://admin:admin@db:5432/demand_submission_v2
        - MODEL_HOST=http://ollama:11434
      command: >
        sh -c "uv run alembic upgrade head && 
             PGPASSWORD=$$POSTGRES_PASSWORD psql -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -f script.sql && 
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./Frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ollama-init:
      image: ollama/ollama:latest
      depends_on:
        ollama:
          condition: service_healthy
      environment:
        - OLLAMA_HOST=http://ollama:11434
      entrypoint: ["/bin/sh", "-c"]
      command:
        - |
          echo "Attempting to pull Mistral..."
          until ollama pull mistral; do
            echo 'Retrying pull in 5s...'
            sleep 5
          done
          echo "Model pull complete."

volumes:
  pg_data:
  ollama_data: